name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Ensure tag points at a commit on main
        run: |
          git fetch origin main --depth=1
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "Tag $GITHUB_REF_NAME does not point at a commit on main, skipping release."
            exit 1
          fi

      - name: Package theme files
        run: |
          zip -j "SimpleUUlm-BeamerTheme-${GITHUB_REF_NAME}.zip" \
            beamerthemeSimpleUUlm.sty \
            beamercolorthemeSimpleUUlm.sty \
            beamerfontthemeSimpleUUlm.sty \
            beamerinnerthemeSimpleUUlm.sty

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "SimpleUUlm-BeamerTheme-${GITHUB_REF_NAME}.zip" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
